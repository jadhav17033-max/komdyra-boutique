    <style>
        :root { --gold: #e3c08d; --pink: #fbcfe8; --bg-dark: #070707; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-dark); color: #fff; overflow-x: hidden; padding-bottom: 70px; }
        .font-luxe { font-family: 'Cinzel', serif; }
        .font-accent { font-family: 'Playfair Display', serif; }

        /* Flashing Install Button */
        @keyframes pulse-gold { 
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(227, 192, 141, 0.7); } 
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(227, 192, 141, 0); } 
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(227, 192, 141, 0); } 
        }
        .btn-install-pop { animation: pulse-gold 2s infinite; background: var(--gold); color: #000; font-weight: 800; border-radius: 4px; }

        /* Premium Buy Now Button */
        .btn-buy-now { 
            background: linear-gradient(90deg, #e3c08d, #fbcfe8); 
            color: black; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 2px; transition: 0.3s; border-radius: 8px;
        }
        .btn-buy-now:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(251, 207, 232, 0.3); }

        /* Sticky Bottom Bar */
        .sticky-buy-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(7, 7, 7, 0.95); backdrop-filter: blur(10px);
            border-top: 1px solid var(--gold); padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 2000;
        }

        .text-gradient {
            background: linear-gradient(90deg, var(--gold), var(--pink), var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 5s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .reveal { opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        .product-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(227, 192, 141, 0.1); border-radius: 12px; overflow: hidden; }
    </style>
</head>
