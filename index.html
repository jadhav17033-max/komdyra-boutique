<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMDYRA | The Private Label</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fbcfe8">
    <link rel="apple-touch-icon" href="images/traditional.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&family=Playfair+Display:italic,wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #e3c08d; --pink: #fbcfe8; --bg-dark: #0a0a0a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-dark); color: #fff; overflow-x: hidden; }
        .font-luxe { font-family: 'Cinzel', serif; }
        .header-banner {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('images/traditional.jpg');
            background-size: cover; background-position: center;
            height: 150px; display: flex; align-items: center; justify-content: center;
            border-bottom: 2px solid var(--gold);
        }
        .product-card { background: #121212; border: 1px solid rgba(251, 207, 232, 0.1); border-radius: 8px; }
        #install-btn { display: none; background: #e3c08d; color: #000; font-size: 9px; padding: 8px 15px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="header-banner">
        <div class="text-center">
            <h1 class="text-4xl font-luxe tracking-[15px] uppercase">Komdyra</h1>
            <p class="text-[8px] tracking-[4px] uppercase text-pink-200 mt-2">Private Label Boutique</p>
        </div>
    </div>

    <nav class="sticky top-0 z-[1000] bg-black/90 py-4 px-6 flex justify-between items-center border-b border-white/5">
        <button id="install-btn"><i class="fas fa-download mr-2"></i> Install App</button>
        <div class="flex gap-4">
            <a href="https://wa.me/919529766940" class="bg-pink-200 text-black px-4 py-2 text-[8px] font-bold tracking-widest uppercase">WhatsApp Inquiry</a>
        </div>
    </nav>

    <section id="collection" class="max-w-7xl mx-auto px-6 py-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="reveal product-card p-4 group">
                <div class="relative overflow-hidden aspect-[3/4] mb-4 bg-neutral-900 rounded">
                    <img src="images/dupatta.jpg" onerror="this.src='https://via.placeholder.com/400x600?text=Check+Image+Name'" class="w-full h-full object-cover">
                </div>
                <h4 class="text-[10px] font-luxe tracking-widest">Embroidery Dupatta</h4>
                <p class="text-pink-200 text-lg mt-2">₹1099</p>
            </div>
            <div class="reveal product-card p-4 group">
                <div class="relative overflow-hidden aspect-[3/4] mb-4 bg-neutral-900 rounded">
                    <img src="images/kurti.jpg" onerror="this.src='https://via.placeholder.com/400x600?text=Check+Image+Name'" class="w-full h-full object-cover">
                </div>
                <h4 class="text-[10px] font-luxe tracking-widest">Designer Kurti</h4>
                <p class="text-pink-200 text-lg mt-2">₹599</p>
            </div>
            <div class="reveal product-card p-4 group">
                <div class="relative overflow-hidden aspect-[3/4] mb-4 bg-neutral-900 rounded">
                    <img src="images/ruffle.jpg" onerror="this.src='https://via.placeholder.com/400x600?text=Check+Image+Name'" class="w-full h-full object-cover">
                </div>
                <h4 class="text-[10px] font-luxe tracking-widest">Ruffle Skirt</h4>
                <p class="text-pink-200 text-lg mt-2">₹399</p>
            </div>
            <div class="reveal product-card p-4 group">
                <div class="relative overflow-hidden aspect-[3/4] mb-4 bg-neutral-900 rounded">
                    <img src="images/scrunchies.jpg" onerror="this.src='https://via.placeholder.com/400x600?text=Check+Image+Name'" class="w-full h-full object-cover">
                </div>
                <h4 class="text-[10px] font-luxe tracking-widest">Silk Scrunchies</h4>
                <p class="text-pink-200 text-lg mt-2">₹50</p>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center bg-[#050505]">
        <h2 class="text-xl font-luxe tracking-[10px] text-pink-200 uppercase mb-4">Komdyra</h2>
        <p class="text-[8px] text-gray-500 uppercase tracking-widest">Founded by Komal Gunjal</p>
    </footer>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });
        installBtn.addEventListener('click', () => {
            installBtn.style.display = 'none';
            deferredPrompt.prompt();
        });
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 50) { reveals[i].classList.add("active"); }
            }
        }
        window.addEventListener("scroll", reveal);
        reveal();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
